# [test] timeout here would be the obvious place to raise the per-test
# timeout, but bunfig.toml's `timeout` key is a documented no-op in Bun
# 1.3.14 — it's silently ignored and every test still gets the 5000ms
# default regardless of what's set here (https://github.com/oven-sh/bun/issues/7789).
# We hit this directly: CI failures traced back to a test that took ~8s
# (PGlite boot, contended under `--parallel`) getting killed at the real
# 5000ms default despite this file. Use the `--timeout` CLI flag instead —
# see the `test` script in package.json and the `unit` job in
# .github/workflows/ci.yml. Revisit once the linked issue is fixed upstream.
#
# coverageThreshold, unlike timeout above, is actually honored: `bun test
# --coverage` fails the run (non-zero exit) once either figure drops below
# its threshold. Current coverage sits around 84% lines / 75% functions (see
# `bun run test:coverage`); thresholds are set a few points below that as a
# regression guard, not a target — raise them as coverage genuinely improves
# rather than lowering them to make a drop pass.
[test]
coverageThreshold = { line = 0.80, function = 0.70 }
