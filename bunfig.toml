[test]
# PGlite (an embedded real Postgres, used in tests for fidelity with the
# production PGlite-backed Db.ts) spins up a fresh WASM Postgres instance per
# test and is noticeably slower to boot than bun:sqlite's in-memory driver
# was — the default 5s timeout is too tight for that plus argon2id hashing
# under concurrent test-file load.
timeout = 15000
