services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: chat_platform
      POSTGRES_PASSWORD: chat_platform
      POSTGRES_DB: chat_platform
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chat_platform"]
      interval: 2s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 20

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://chat_platform:chat_platform@db:5432/chat_platform
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-long-random-secret}
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:3001}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
