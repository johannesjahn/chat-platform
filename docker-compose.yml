services:
  # Postgres major versions aren't on-disk compatible — starting the new
  # major version's image straight against an existing volume from the
  # previous major version refuses to boot. This one-shot service runs
  # first, using pgautoupgrade (https://github.com/pgautoupgrade/docker-pgautoupgrade,
  # a wrapper around the official image that bundles both major versions'
  # binaries) to pg_upgrade the volume in place if it finds old-version data,
  # then exits; a no-op if the volume's already on the current major version.
  # `db` only starts once this exits successfully.
  db-upgrade:
    image: pgautoupgrade/pgautoupgrade:18-alpine
    environment:
      # On a brand new volume (nothing to upgrade — e.g. first-ever `docker
      # compose up`, or CI, which always starts from an empty volume),
      # pgautoupgrade falls back to running initdb itself. It needs
      # POSTGRES_USER/POSTGRES_DB for that fresh init to create the same
      # role/database `db` below expects — without them it initializes a
      # bare cluster, and `db` then finds the directory already initialized
      # and skips its own init, leaving the chat_platform role missing.
      POSTGRES_USER: chat_platform
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD to a long random secret before running docker compose up}
      POSTGRES_DB: chat_platform
      # Postgres 18's image defaults PGDATA to a version-specific
      # subdirectory (.../18/docker) instead of the flat layout every prior
      # major version (and this volume) used — pin it explicitly so both
      # this and `db` below keep using the same path this volume has always
      # had, instead of silently treating it as a fresh, empty volume.
      PGDATA: /var/lib/postgresql/data
      PGAUTO_ONESHOT: "yes"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: "no"

  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: chat_platform
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD to a long random secret before running docker compose up}
      POSTGRES_DB: chat_platform
      # See db-upgrade's PGDATA comment above.
      PGDATA: /var/lib/postgresql/data
    volumes:
      - pgdata:/var/lib/postgresql/data
    depends_on:
      db-upgrade:
        condition: service_completed_successfully
    # Bound to localhost only — the `app` service reaches this over the
    # compose network regardless; this port is for local debugging (e.g.
    # `psql -h localhost`), not for exposing Postgres to the network.
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chat_platform"]
      interval: 2s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7.4.9-alpine
    command:
      [
        "redis-server",
        "--requirepass",
        "${REDIS_PASSWORD:?Set REDIS_PASSWORD to a long random secret before running docker compose up}",
      ]
    # Bound to localhost only — see the `db` service's `ports` comment above.
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test:
        [
          "CMD",
          "redis-cli",
          "-a",
          "${REDIS_PASSWORD}",
          "--no-auth-warning",
          "ping",
        ]
      interval: 2s
      timeout: 5s
      retries: 20

  app:
    build:
      context: .
      # Only consulted when building through buildx bake (CI sets
      # COMPOSE_BAKE=true and registers a GHA-backed builder via
      # docker/setup-buildx-action — see .github/workflows/ci.yml's `docker`
      # job); plain `docker compose build` on a dev machine ignores these
      # and just uses the local Docker build cache as before.
      cache_from:
        - type=gha
      cache_to:
        - type=gha,mode=max
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://chat_platform:${POSTGRES_PASSWORD}@db:5432/chat_platform
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      # No insecure fallback here on purpose — see JWT_SECRET's own
      # `:?` guard below. A well-known default secret would let anyone
      # forge an admin access token (see src/Jwt.ts).
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET to a long random secret before running docker compose up}
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:3001}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Readiness (see src/Health.ts's `/ready`), not just liveness — confirms
    # the app can actually reach `db`/`redis` before compose reports it
    # healthy, matching the Dockerfile's own (liveness-only) HEALTHCHECK.
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "fetch('http://localhost:3000/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      start_period: 10s
      retries: 5

volumes:
  pgdata:
