services:
  # Postgres major versions aren't on-disk compatible — starting the new
  # major version's image straight against an existing volume from the
  # previous major version refuses to boot. This one-shot service runs
  # first, using pgautoupgrade (https://github.com/pgautoupgrade/docker-pgautoupgrade,
  # a wrapper around the official image that bundles both major versions'
  # binaries) to pg_upgrade the volume in place if it finds old-version data,
  # then exits; a no-op if the volume's already on the current major version.
  # `db` only starts once this exits successfully.
  db-upgrade:
    image: pgautoupgrade/pgautoupgrade:18-alpine
    environment:
      # On a brand new volume (nothing to upgrade — e.g. first-ever `docker
      # compose up`, or CI, which always starts from an empty volume),
      # pgautoupgrade falls back to running initdb itself. It needs
      # POSTGRES_USER/POSTGRES_DB for that fresh init to create the same
      # role/database `db` below expects — without them it initializes a
      # bare cluster, and `db` then finds the directory already initialized
      # and skips its own init, leaving the chat_platform role missing.
      POSTGRES_USER: chat_platform
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD to a long random secret before running docker compose up}
      POSTGRES_DB: chat_platform
      # Postgres 18's image defaults PGDATA to a version-specific
      # subdirectory (.../18/docker) instead of the flat layout every prior
      # major version (and this volume) used — pin it explicitly so both
      # this and `db` below keep using the same path this volume has always
      # had, instead of silently treating it as a fresh, empty volume.
      PGDATA: /var/lib/postgresql/data
      PGAUTO_ONESHOT: "yes"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: "no"

  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: chat_platform
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD to a long random secret before running docker compose up}
      POSTGRES_DB: chat_platform
      # See db-upgrade's PGDATA comment above.
      PGDATA: /var/lib/postgresql/data
    volumes:
      - pgdata:/var/lib/postgresql/data
    depends_on:
      db-upgrade:
        condition: service_completed_successfully
    # Bound to localhost only — the `app` service reaches this over the
    # compose network regardless; this port is for local debugging (e.g.
    # `psql -h localhost`), not for exposing Postgres to the network.
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chat_platform"]
      interval: 2s
      timeout: 5s
      retries: 20

  redis:
    image: redis:8.8.0-alpine
    command:
      [
        "redis-server",
        "--requirepass",
        "${REDIS_PASSWORD:?Set REDIS_PASSWORD to a long random secret before running docker compose up}",
      ]
    # Bound to localhost only — see the `db` service's `ports` comment above.
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test:
        [
          "CMD",
          "redis-cli",
          "-a",
          "${REDIS_PASSWORD}",
          "--no-auth-warning",
          "ping",
        ]
      interval: 2s
      timeout: 5s
      retries: 20

  # S3-compatible object storage for file/media uploads (issue #221) — see
  # src/AttachmentStorage.ts. In production this is replaced by a real
  # cloud bucket (AWS S3, Cloudflare R2, GCS) by pointing S3_ENDPOINT there
  # instead; MinIO exists purely for dev-prod parity in local/in-cluster dev
  # (mirrored by the Helm chart's `minio.enabled` flag).
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:?Set S3_ACCESS_KEY_ID before running docker compose up}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:?Set S3_SECRET_ACCESS_KEY to a long random secret before running docker compose up}
    volumes:
      - miniodata:/data
    # 9000 (the S3 API) is bound to localhost so it's reachable from the
    # *browser* too, not just the `app` container — presigned attachment
    # URLs point at whatever S3_PUBLIC_ENDPOINT below resolves to, and on a
    # dev machine that's this host's localhost. 9001 is the web console, for
    # poking at the bucket by hand; neither is meant to be exposed beyond
    # local dev.
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 2s
      timeout: 5s
      retries: 20

  # One-shot: creates the bucket `app` uploads into. MinIO doesn't create
  # buckets on its own, unlike a managed cloud bucket you'd provision
  # out-of-band before pointing S3_ENDPOINT at it.
  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      minio:
        condition: service_healthy
    environment:
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-chat-platform-attachments}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:?Set S3_ACCESS_KEY_ID before running docker compose up}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:?Set S3_SECRET_ACCESS_KEY to a long random secret before running docker compose up}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 \"$$S3_ACCESS_KEY_ID\" \"$$S3_SECRET_ACCESS_KEY\" &&
      mc mb --ignore-existing local/\"$$S3_BUCKET_NAME\"
      "
    restart: "no"

  # Runs Drizzle migrations to completion before the `app` service boots,
  # matching the Helm chart's pre-upgrade migration Job (see issue #178).
  # DATABASE_URL mode no longer auto-migrates on boot — this one-shot
  # service handles it instead so `docker compose up` just works.
  db-migrate:
    build:
      context: .
    command: ["bun", "run", "db:migrate"]
    environment:
      DATABASE_URL: postgres://chat_platform:${POSTGRES_PASSWORD}@db:5432/chat_platform
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  app:
    build:
      context: .
      # Only consulted when building through buildx bake (CI sets
      # COMPOSE_BAKE=true and registers a GHA-backed builder via
      # docker/setup-buildx-action — see .github/workflows/ci.yml's `docker`
      # job); plain `docker compose build` on a dev machine ignores these
      # and just uses the local Docker build cache as before.
      cache_from:
        - type=gha
      cache_to:
        - type=gha,mode=max
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://chat_platform:${POSTGRES_PASSWORD}@db:5432/chat_platform
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      # No insecure fallback here on purpose — see JWT_SECRET's own
      # `:?` guard below. A well-known default secret would let anyone
      # forge an admin access token (see src/Jwt.ts).
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET to a long random secret before running docker compose up}
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:3001}
      # `app` reaches MinIO over the compose network by service name, but a
      # presigned URL handed to the browser needs the host-mapped address
      # instead — see src/AttachmentStorage.ts's S3_PUBLIC_ENDPOINT.
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: http://localhost:9000
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-chat-platform-attachments}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:?Set S3_ACCESS_KEY_ID before running docker compose up}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:?Set S3_SECRET_ACCESS_KEY to a long random secret before running docker compose up}
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    # Readiness (see src/Health.ts's `/ready`), not just liveness — confirms
    # the app can actually reach `db`/`redis` before compose reports it
    # healthy, matching the Dockerfile's own (liveness-only) HEALTHCHECK.
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "fetch('http://localhost:3000/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      start_period: 10s
      retries: 5

volumes:
  pgdata:
  miniodata:
