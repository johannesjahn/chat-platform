{{- if .Values.minio.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "chat-platform.fullname" . }}-minio
  labels:
    {{- include "chat-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: minio
spec:
  type: ClusterIP
  selector:
    {{- include "chat-platform.selectorLabels" (dict "Release" .Release "Chart" .Chart "component" "minio") | nindent 4 }}
  ports:
    - port: 9000
      targetPort: s3
      name: s3
    - port: 9001
      targetPort: console
      name: console
{{- end }}
