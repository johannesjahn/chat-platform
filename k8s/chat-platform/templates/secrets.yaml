{{- $fullname := include "chat-platform.fullname" . -}}
{{- $secretName := printf "%s-secrets" $fullname -}}
{{/*
One Secret holding every password/secret this chart manages itself — skipping
whichever ones are configured to use an existingSecret instead. Values are
get-or-generated via chat-platform.secretValue so `helm upgrade` doesn't
rotate them.
*/}}
{{- if or (not .Values.jwt.existingSecret) (not .Values.postgres.auth.existingSecret) (not .Values.redis.auth.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "chat-platform.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if not .Values.jwt.existingSecret }}
  jwt-secret: {{ include "chat-platform.secretValue" (dict "context" . "name" $secretName "key" "jwt-secret" "default" .Values.jwt.secret) | b64enc }}
  {{- end }}
  {{- if not .Values.postgres.auth.existingSecret }}
  postgres-password: {{ include "chat-platform.secretValue" (dict "context" . "name" $secretName "key" "postgres-password" "default" .Values.postgres.auth.password) | b64enc }}
  {{- end }}
  {{- if not .Values.redis.auth.existingSecret }}
  redis-password: {{ include "chat-platform.secretValue" (dict "context" . "name" $secretName "key" "redis-password" "default" .Values.redis.auth.password) | b64enc }}
  {{- end }}
{{- end }}
