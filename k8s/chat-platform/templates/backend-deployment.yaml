{{- $fullname := include "chat-platform.fullname" . -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $fullname }}-backend
  labels:
    {{- include "chat-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      {{- include "chat-platform.selectorLabels" (dict "Release" .Release "Chart" .Chart "component" "backend") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "chat-platform.labels" . | nindent 8 }}
        app.kubernetes.io/component: backend
      {{- with .Values.backend.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.backend.port }}
              name: http
          env:
            - name: PORT
              value: {{ .Values.backend.port | quote }}
            - name: WEB_ORIGIN
              value: {{ .Values.backend.webOrigin | quote }}
            {{- include "chat-platform.postgresEnv" . | nindent 12 }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "chat-platform.redisSecretName" . }}
                  key: {{ include "chat-platform.redisSecretKey" . }}
            - name: REDIS_URL
              value: "redis://:$(REDIS_PASSWORD)@{{ $fullname }}-redis:6379"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "chat-platform.jwtSecretName" . }}
                  key: {{ include "chat-platform.jwtSecretKey" . }}
            - name: TRUST_PROXY
              value: {{ .Values.backend.trustProxy | quote }}
          # See src/Health.ts: /health is liveness-only (no dependency
          # checks), /ready additionally confirms Postgres and Redis are
          # reachable.
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
      {{- with .Values.backend.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.backend.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.backend.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
