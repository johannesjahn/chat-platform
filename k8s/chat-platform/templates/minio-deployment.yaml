{{- if .Values.minio.enabled }}
{{- $fullname := include "chat-platform.fullname" . -}}
# Local/in-cluster S3-compatible object storage for file/media uploads
# (issue #221) — see src/AttachmentStorage.ts. Disable (minio.enabled: false)
# and point backend.s3.* at a real cloud bucket (AWS S3, Cloudflare R2, GCS)
# instead for production — this exists purely for dev-prod parity, mirroring
# docker-compose.yml's `minio` service.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $fullname }}-minio
  labels:
    {{- include "chat-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: minio
spec:
  # A single replica writing to its own volume — Recreate avoids two pods
  # ever mounting the same ReadWriteOnce PVC at once during a rollout
  # (mirrors redis-deployment.yaml).
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "chat-platform.selectorLabels" (dict "Release" .Release "Chart" .Chart "component" "minio") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "chat-platform.labels" . | nindent 8 }}
        app.kubernetes.io/component: minio
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: minio
          image: "{{ .Values.minio.image.repository }}:{{ .Values.minio.image.tag }}"
          args:
            - server
            - /data
            - --console-address
            - ":9001"
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "chat-platform.s3SecretName" . }}
                  key: access-key
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "chat-platform.s3SecretName" . }}
                  key: secret-key
          ports:
            - containerPort: 9000
              name: s3
            - containerPort: 9001
              name: console
          {{- if .Values.minio.persistence.enabled }}
          volumeMounts:
            - name: data
              mountPath: /data
          {{- end }}
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: s3
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: s3
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
          resources:
            {{- toYaml .Values.minio.resources | nindent 12 }}
      {{- if .Values.minio.persistence.enabled }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ $fullname }}-minio
      {{- end }}
{{- end }}
