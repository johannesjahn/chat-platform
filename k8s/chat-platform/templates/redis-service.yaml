apiVersion: v1
kind: Service
metadata:
  name: {{ include "chat-platform.fullname" . }}-redis
  labels:
    {{- include "chat-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  type: ClusterIP
  selector:
    {{- include "chat-platform.selectorLabels" (dict "Release" .Release "Chart" .Chart "component" "redis") | nindent 4 }}
  ports:
    - port: 6379
      targetPort: redis
      name: redis
