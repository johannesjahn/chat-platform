{{- $fullname := include "chat-platform.fullname" . -}}
# Runs Drizzle migrations to completion before Helm installs or upgrades the
# backend Deployment, so replica pods never race each other on schema changes.
# See issue #178 and scripts/migrate.ts.
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ $fullname }}-migrate-{{ .Release.Revision }}
  labels:
    {{- include "chat-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: migrate
  annotations:
    # Run before the backend Deployment is created/updated — Helm waits for
    # this Job to succeed before proceeding with the main release.
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "0"
    # Delete the previous Job before creating a new one (each revision gets a
    # unique name via Release.Revision, but this keeps things tidy if the
    # chart is re-installed from scratch).
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        {{- include "chat-platform.labels" . | nindent 8 }}
        app.kubernetes.io/component: migrate
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      restartPolicy: Never
      containers:
        - name: migrate
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          command: ["bun", "run", "db:migrate"]
          env:
            - name: POSTGRES_USER
              value: {{ .Values.postgres.auth.username | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "chat-platform.postgresSecretName" . }}
                  key: {{ include "chat-platform.postgresSecretKey" . }}
            - name: POSTGRES_DB
              value: {{ .Values.postgres.auth.database | quote }}
            - name: DATABASE_URL
              value: "postgres://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@{{ $fullname }}-postgres:5432/$(POSTGRES_DB)"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
