# Default values for the chat-platform chart.

global:
  # Pull secrets shared by every workload this chart creates.
  imagePullSecrets: []

# -- The chat-platform backend (Bun + Effect HttpApi). No frontend
# deployment here — the frontend is a static SPA built from `web/` and
# hosted on Cloudflare Workers instead (see ../README.md).
backend:
  image:
    # Build & push the repo-root Dockerfile to a registry this cluster can
    # pull from, then point this at it (e.g. ghcr.io/<you>/chat-platform).
    repository: ghcr.io/johannesjahn/chat-platform
    # Defaults to .Chart.AppVersion when empty.
    tag: ""
    pullPolicy: IfNotPresent

  replicaCount: 2
  port: 3000

  # The origin(s) the Cloudflare Workers frontend is served from — the
  # backend's CORS middleware only allows origin(s) listed here (see
  # src/main.ts). Comma-separate multiple values, e.g. a custom domain plus
  # its *.workers.dev URL: "https://chat.example.com,https://chat-platform.<subdomain>.workers.dev".
  webOrigin: "https://chat-platform.johannes-jahn-ca7.workers.dev,https://chat-platform.johannes-jahn.com"

  service:
    type: ClusterIP
    port: 80

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  ingress:
    enabled: true
    className: "nginx"
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt
    host: api.chat-platform.example.com
    tls:
      enabled: true
      secretName: chat-platform-api-tls

  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

postgres:
  image:
    repository: postgres
    tag: "17-alpine"

  auth:
    username: chat_platform
    database: chat_platform
    # Leave blank to auto-generate a random password on first install (it's
    # then preserved across `helm upgrade`, not rotated — see
    # templates/_helpers.tpl's `chat-platform.secretValue`). Set explicitly,
    # or prefer `existingSecret` for a production install.
    password: ""
    # Name of a pre-existing Secret to read POSTGRES_PASSWORD from instead of
    # the one this chart manages. When set, `password` above is ignored.
    existingSecret: ""
    existingSecretKey: "postgres-password"

  persistence:
    enabled: true
    size: 5Gi
    # Empty uses the cluster's default StorageClass.
    storageClassName: ""

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi

redis:
  image:
    repository: redis
    tag: "7-alpine"

  auth:
    password: ""
    existingSecret: ""
    existingSecretKey: "redis-password"

  # Redis here backs realtime Pub/Sub fan-out and rate limiting (see
  # src/PubSub.ts / src/RateLimiter.ts) — both tolerate a cold cache, so
  # persistence defaults off. Enable it if you'd rather Redis survive pod
  # restarts.
  persistence:
    enabled: false
    size: 1Gi
    storageClassName: ""

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi

jwt:
  # Signs refresh JWTs (see src/Jwt.ts) — required. Leave blank to
  # auto-generate on first install (preserved across upgrades), set
  # explicitly, or prefer `existingSecret` for production.
  secret: ""
  existingSecret: ""
  existingSecretKey: "jwt-secret"
