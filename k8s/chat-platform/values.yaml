# Default values for the chat-platform chart.

global:
  # Pull secrets shared by every workload this chart creates.
  imagePullSecrets: []

# -- The chat-platform backend (Bun + Effect HttpApi). No frontend
# deployment here — the frontend is a static SPA built from `web/` and
# hosted on Cloudflare Workers instead (see ../README.md).
backend:
  image:
    # Build & push the repo-root Dockerfile to a registry this cluster can
    # pull from, then point this at it (e.g. ghcr.io/<you>/chat-platform).
    repository: johannesjahn/chat-platform
    tag: "0.7.1"
    pullPolicy: IfNotPresent

  replicaCount: 2
  port: 3000

  # The origin(s) the Cloudflare Workers frontend is served from — the
  # backend's CORS middleware only allows origin(s) listed here (see
  # src/main.ts). Comma-separate multiple values, e.g. a custom domain plus
  # its *.workers.dev URL: "https://chat.example.com,https://chat-platform.<subdomain>.workers.dev".
  webOrigin: "https://nacho.johannes-jahn.com"

  service:
    type: ClusterIP
    port: 80

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  ingress:
    enabled: true
    className: "traefik"
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt
    host: api.chat-platform.johannes-jahn.com
    tls:
      enabled: true
      secretName: chat-platform-api-tls

  # GET /metrics (issue #124) — vmagent (see ../observability/) scrapes it
  # via the backend Service directly in-cluster, never through the Ingress
  # above, so it stays unauthenticated at the application level, same as
  # /health and /ready.
  metrics:
    serviceScrape:
      # Registers a VMServiceScrape (the VictoriaMetrics Operator CRD,
      # analogous to Prometheus Operator's ServiceMonitor — see
      # backend-metrics-servicescrape.yaml) so vmagent picks up
      # backend-service.yaml's Service automatically. Requires the VM
      # Operator CRDs to already be installed (true once
      # ../observability/'s victoria-metrics-k8s-stack is deployed) —
      # disable if installing this chart without that stack.
      enabled: true

    grafanaDashboard:
      # Ships a pre-built Grafana dashboard for these metrics as a labeled
      # ConfigMap (see backend-metrics-grafana-dashboard.yaml) that
      # ../observability/'s Grafana sidecar auto-loads — no manual import.
      # Requires that sidecar to be enabled and watching this namespace
      # (true by default once ../observability/'s stack is deployed — see
      # its values.yaml's grafana.sidecar.dashboards) — disable if
      # installing this chart without that stack.
      enabled: true

    alerts:
      # Ships the backend-specific half of #125's starter alert rule set
      # (readiness failing, high 5xx rate) as a VMRule (see
      # backend-metrics-alerts.yaml) — picked up by ../observability/'s
      # vmalert automatically, same reasoning as serviceScrape above.
      # Requires ../observability/'s vmalert to be enabled — disable if
      # installing this chart without that stack.
      enabled: true

  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

postgres:
  image:
    repository: postgres
    tag: "17-alpine"

  auth:
    username: chat_platform
    database: chat_platform
    # Name of a pre-existing Secret to read POSTGRES_PASSWORD from — required,
    # the chart no longer manages this password itself (see git history if
    # you need the old auto-generate-on-install behavior; it relied on a
    # `lookup`-based trick that silently breaks under ArgoCD, which renders
    # Helm charts without a live cluster connection — every auto-sync would
    # regenerate a fresh random password and overwrite the Secret, while an
    # already-initialized Postgres wouldn't pick up the new value and would
    # stop authenticating). Create it once by hand, e.g.:
    #   kubectl create secret generic postgres-password \
    #     --from-literal=postgres-password="$(openssl rand -base64 24)"
    # The password is read from a data key matching the Secret's own name.
    existingSecret: "postgres-password"

  persistence:
    enabled: true
    size: 5Gi
    # Empty uses the cluster's default StorageClass.
    storageClassName: ""

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi

redis:
  image:
    repository: redis
    tag: "7.4.9-alpine"

  auth:
    # Required — see postgres.auth.existingSecret above for why.
    existingSecret: "redis-password"

  # Redis here backs realtime Pub/Sub fan-out and rate limiting (see
  # src/PubSub.ts / src/RateLimiter.ts) — both tolerate a cold cache, so
  # persistence defaults off. Enable it if you'd rather Redis survive pod
  # restarts.
  persistence:
    enabled: false
    size: 1Gi
    storageClassName: ""

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi

jwt:
  # Signs refresh JWTs (see src/Jwt.ts). Required — see
  # postgres.auth.existingSecret above for why.
  existingSecret: "jwt"
