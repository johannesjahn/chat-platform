name: Tag Release

# Creates a "v"-prefixed git tag from the version in package.json whenever it
# changes on main (e.g. 0.1.0 -> v0.1.0), then builds and pushes the backend
# Docker image for that tag (see Dockerfile). Docker image tags don't carry
# the git tag's "v" prefix. Does nothing if the tag already exists (e.g.
# package.json changed but not the version). Runs after the CI workflow
# finishes on main, and only proceeds if CI succeeded, so releases are never
# tagged from a broken build.
#
# The docker job is a separate job (rather than a step in `tag`) so it runs
# with its own checkout at the new tag. Tagging and building used to be two
# separate workflows connected by a `push: tags` trigger, but pushing the
# tag with the default GITHUB_TOKEN doesn't fire other workflows' `push`
# triggers (GitHub blocks that to avoid recursive runs), so the build never
# ran. Doing both in one workflow sidesteps that entirely.
#
# The version bump lands on main (via sync:chart-version, see
# k8s/chat-platform/values.yaml's backend.image.tag) well before this
# workflow finishes building and pushing the matching image tag, so ArgoCD's
# auto-sync is disabled — otherwise it'd try to pull a tag that doesn't
# exist on Docker Hub yet. The argocd-sync job closes that gap by triggering
# a sync explicitly, only once the image for the new tag is actually
# up. It's skipped along with `docker` (and thus never fires an unnecessary
# sync) whenever `tag` didn't create a new release.
#
# deploy-frontend builds web/ and pushes it to Cloudflare Workers (static
# assets) via Wrangler — see k8s/README.md's "Frontend: Cloudflare Workers"
# section. It lives here (rather than its own push-triggered workflow) so it
# stays tied to the same release as the backend image build. It runs in
# parallel with argocd-sync (both only need `docker`, not each other) since
# the two deploys are independent — the frontend doesn't need the backend's
# ArgoCD sync to have happened first. It only runs when `tag` actually cut a
# new release, so frontend deploys stay tied to a backend version bump
# instead of running on every pipeline invocation.
#
# workflow_dispatch runs the same pipeline manually (e.g. to retry a release
# that didn't fire automatically) rather than being a frontend-only shortcut.
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  tag:
    name: Tag release
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      created: ${{ steps.check.outputs.exists == 'false' }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 0

      - name: Read version from package.json
        id: version
        run: echo "tag=v$(jq -r .version package.json)" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: check
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push tag
        if: steps.check.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

  docker:
    name: Build and push Docker image
    needs: tag
    if: needs.tag.outputs.created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ needs.tag.outputs.tag }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Docker image tags don't carry the git tag's "v" prefix. Derived from
      # the tag job's output rather than GITHUB_REF_NAME: this workflow is
      # triggered by `workflow_run`, so GITHUB_REF_NAME is always the branch
      # the CI run happened on (main), not the tag checked out above.
      - name: Strip "v" prefix for the image tag
        id: version
        run: echo "tag=${TAG#v}" >> "$GITHUB_OUTPUT"
        env:
          TAG: ${{ needs.tag.outputs.tag }}

      - name: Build and push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: true
          tags: |
            johannesjahn/chat-platform:latest
            johannesjahn/chat-platform:${{ steps.version.outputs.tag }}

  argocd-sync:
    name: Trigger ArgoCD sync
    needs: docker
    runs-on: ubuntu-latest
    steps:
      # Not SHA-pinned like the other actions in this file: its action.yml
      # derives the ghcr.io image tag it docker-pulls from the *name of its
      # own checkout directory* (i.e. the ref you pin it to), rather than a
      # hardcoded version — pinning to a commit SHA makes it try to pull a
      # `ghcr.io/omegion/argocd-actions:<sha>` tag that doesn't exist
      # ("manifest unknown"). See renovate.json5's matching packageRule,
      # which keeps Renovate from re-pinning this one.
      - name: Sync ArgoCD Application
        uses: omegion/argocd-actions@v1
        with:
          address: ${{ vars.ARGOCD_ADDRESS }}
          token: ${{ secrets.ARGOCD_TOKEN }}
          action: sync
          appName: ${{ vars.ARGOCD_APP_NAME }}

  deploy-frontend:
    name: Build & deploy frontend to Cloudflare Workers
    needs: [tag, docker]
    if: |
      always() &&
      needs.tag.outputs.created == 'true' &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      BUN_VERSION: 1.3.14
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: web

      - name: Build
        run: bun run build
        working-directory: web
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}

      # dist/client is the static site wrangler.jsonc's assets.directory
      # points at; dist/server is an SSR/prerender artifact TanStack Start
      # also emits and the Worker should never serve.
      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: web
          command: deploy
