name: Tag Release

# Creates a "v"-prefixed git tag from the version in package.json whenever it
# changes on main (e.g. 0.1.0 -> v0.1.0), then builds and pushes the backend
# Docker image for that tag (see Dockerfile). Docker image tags don't carry
# the git tag's "v" prefix. Does nothing if the tag already exists (e.g.
# package.json changed but not the version). Runs after the CI workflow
# finishes on main, and only proceeds if CI succeeded, so releases are never
# tagged from a broken build.
#
# The docker job is a separate job (rather than a step in `tag`) so it runs
# with its own checkout at the new tag. Tagging and building used to be two
# separate workflows connected by a `push: tags` trigger, but pushing the
# tag with the default GITHUB_TOKEN doesn't fire other workflows' `push`
# triggers (GitHub blocks that to avoid recursive runs), so the build never
# ran. Doing both in one workflow sidesteps that entirely.
#
# The version bump lands on main (via sync:chart-version, see
# k8s/chat-platform/values.yaml's backend.image.tag) well before this
# workflow finishes building and pushing the matching image tag, so ArgoCD's
# auto-sync is disabled — otherwise it'd try to pull a tag that doesn't
# exist on Docker Hub yet. The argocd-sync job closes that gap by triggering
# a sync explicitly, only once the image for the new tag is actually
# up. It's skipped along with `docker` (and thus never fires an unnecessary
# sync) whenever `tag` didn't create a new release.
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

permissions:
  contents: write

jobs:
  tag:
    name: Tag release
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      created: ${{ steps.check.outputs.exists == 'false' }}
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Read version from package.json
        id: version
        run: echo "tag=v$(jq -r .version package.json)" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: check
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push tag
        if: steps.check.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

  docker:
    name: Build and push Docker image
    needs: tag
    if: needs.tag.outputs.created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          ref: ${{ needs.tag.outputs.tag }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Docker image tags don't carry the git tag's "v" prefix. Derived from
      # the tag job's output rather than GITHUB_REF_NAME: this workflow is
      # triggered by `workflow_run`, so GITHUB_REF_NAME is always the branch
      # the CI run happened on (main), not the tag checked out above.
      - name: Strip "v" prefix for the image tag
        id: version
        run: echo "tag=${TAG#v}" >> "$GITHUB_OUTPUT"
        env:
          TAG: ${{ needs.tag.outputs.tag }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            johannesjahn/chat-platform:latest
            johannesjahn/chat-platform:${{ steps.version.outputs.tag }}

  argocd-sync:
    name: Trigger ArgoCD sync
    needs: docker
    runs-on: ubuntu-latest
    steps:
      - name: Sync ArgoCD application
        run: |
          curl --fail --silent --show-error --request POST \
            "$ARGOCD_ADDRESS/api/v1/applications/$ARGOCD_APP_NAME/sync" \
            --header "Authorization: Bearer $ARGOCD_TOKEN" \
            --header "Content-Type: application/json" \
            --data '{}'
        env:
          ARGOCD_ADDRESS: ${{ vars.ARGOCD_ADDRESS }}
          ARGOCD_APP_NAME: ${{ vars.ARGOCD_APP_NAME }}
          ARGOCD_TOKEN: ${{ secrets.ARGOCD_TOKEN }}
