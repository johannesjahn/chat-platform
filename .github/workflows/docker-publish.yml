name: Docker Publish

# Builds the backend image (see Dockerfile) and pushes it to Docker Hub.
# Only runs on version tags — see tag-release.yml for how those get created.
on:
  push:
    tags:
      - "v*.*.*"

jobs:
  docker:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Docker image tags don't carry the git tag's "v" prefix.
      - name: Strip "v" prefix for the image tag
        id: version
        run: echo "tag=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            johannesjahn/chat-platform:latest
            johannesjahn/chat-platform:${{ steps.version.outputs.tag }}
