name: Bump Version

# Manually triggered from the GitHub UI (Actions tab -> Bump Version -> Run
# workflow). Runs `bun run bump <type>` (see scripts/bump.ts) against the
# chosen branch (main by default) and pushes the resulting version-bump
# commit directly to it — this is the manual alternative to bumping the
# version locally and pushing it yourself. Pushing to main here is itself
# what triggers CI and, once CI passes, tag-release.yml (see its
# `workflow_run` trigger) to cut the tag and release; tag-release.yml only
# fires off pushes to main, so bumping a different branch just lands the
# version-bump commit there without cutting a release.
on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version part to bump
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major
      branch:
        description: Branch to bump
        type: string
        default: main

permissions:
  contents: write

env:
  BUN_VERSION: 1.3.14

jobs:
  bump:
    name: Bump version on ${{ inputs.branch }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      # Always bumps the requested branch regardless of which ref the
      # workflow was launched from, since the workflow_dispatch UI lets the
      # caller pick an arbitrary branch/tag to run the workflow file from.
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ inputs.branch }}

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        run: bun run bump ${{ inputs.bump }}

      - name: Push
        run: git push origin HEAD:${{ inputs.branch }}
