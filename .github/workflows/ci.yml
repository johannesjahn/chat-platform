name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  # Single source of truth for the Bun version used across all jobs.
  BUN_VERSION: 1.3.14

jobs:
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check formatting
        run: bun run format:check

      - name: Lint
        run: bun run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install backend dependencies
        run: bun install --frozen-lockfile

      - name: Install web dependencies
        run: bun install --frozen-lockfile
        working-directory: web

      - name: Typecheck backend
        run: bun run typecheck

      # routeTree.gen.ts is generated by TanStack Router at dev/build time and
      # is gitignored, so the route files have no types until it's generated.
      - name: Generate route tree
        run: bun run gen:routes
        working-directory: web

      - name: Typecheck web
        run: bun run typecheck
        working-directory: web

  openapi:
    name: OpenAPI spec & generated types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install backend dependencies
        run: bun install --frozen-lockfile

      - name: Install web dependencies
        run: bun install --frozen-lockfile
        working-directory: web

      - name: Regenerate openapi.json and frontend API types
        run: bun run gen:types
        working-directory: web

      - name: Fail if generated files are out of date
        run: |
          if ! git diff --exit-code -- openapi.json web/src/lib/api-types.ts; then
            echo "::error::openapi.json and/or web/src/lib/api-types.ts are out of date." \
              "Run 'cd web && bun run gen:types' and commit the result."
            exit 1
          fi

  unit:
    name: Backend tests
    runs-on: ubuntu-latest
    # Only RealtimePubSub.integration.test.ts uses this — it's the one test
    # that proves cross-instance delivery over real Redis Pub/Sub (see
    # src/PubSub.ts). Everything else uses the in-memory PubSub fallback and
    # doesn't touch it.
    services:
      redis:
        image: redis:7.4.7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 20
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run backend tests
        run: bun test ./src
        env:
          REDIS_URL: redis://localhost:6379

  e2e:
    name: E2E tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      # The e2e webServer boots the backend (`bun run start`, cwd `..`) and the
      # web dev server, so both workspaces need their dependencies installed.
      - name: Install backend dependencies
        run: bun install --frozen-lockfile

      - name: Install web dependencies
        run: bun install --frozen-lockfile
        working-directory: web

      - name: Install Playwright browser
        run: bunx playwright install --with-deps chromium
        working-directory: web

      - name: Run Playwright tests
        run: bun run test:e2e
        working-directory: web

      - name: Upload Playwright traces
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7.0.1
        with:
          name: playwright-traces
          path: web/test-results/
          if-no-files-found: ignore
          retention-days: 7
