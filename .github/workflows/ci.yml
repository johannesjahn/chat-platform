name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Single source of truth for the Bun version used across all jobs.
  BUN_VERSION: 1.3.14

jobs:
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun install cache
        uses: actions/cache@v6.1.0
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock', 'web/bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check formatting
        run: bun run format:check

      - name: Lint
        run: bun run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun install cache
        uses: actions/cache@v6.1.0
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock', 'web/bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install backend dependencies
        run: bun install --frozen-lockfile

      - name: Install web dependencies
        run: bun install --frozen-lockfile
        working-directory: web

      - name: Typecheck backend
        run: bun run typecheck

      # routeTree.gen.ts is generated by TanStack Router at dev/build time and
      # is gitignored, so the route files have no types until it's generated.
      - name: Generate route tree
        run: bun run gen:routes
        working-directory: web

      - name: Typecheck web
        run: bun run typecheck
        working-directory: web

  openapi:
    name: OpenAPI spec & generated types
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun install cache
        uses: actions/cache@v6.1.0
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock', 'web/bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install backend dependencies
        run: bun install --frozen-lockfile

      - name: Install web dependencies
        run: bun install --frozen-lockfile
        working-directory: web

      - name: Regenerate openapi.json and frontend API types
        run: bun run gen:types
        working-directory: web

      - name: Fail if generated files are out of date
        run: |
          if ! git diff --exit-code -- openapi.json web/src/lib/api-types.ts; then
            echo "::error::openapi.json and/or web/src/lib/api-types.ts are out of date." \
              "Run 'cd web && bun run gen:types' and commit the result."
            exit 1
          fi

  audit:
    name: Dependency vulnerability audit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install backend dependencies
        run: bun install --frozen-lockfile

      - name: Install web dependencies
        run: bun install --frozen-lockfile
        working-directory: web

      # audit-level=high: drizzle-kit currently pulls in a moderate-severity
      # advisory (GHSA-67mh-4wv8-2f99) via its bundled, deprecated
      # @esbuild-kit/* deps — a dev-only esbuild dev-server issue with no
      # upstream fix yet. Gate on high/critical so that's tracked (via
      # Dependabot) without blocking every PR; raise this back to the
      # default (moderate) once it's resolved upstream.
      - name: Audit backend dependencies
        run: bun audit --audit-level=high

      - name: Audit web dependencies
        run: bun audit --audit-level=high
        working-directory: web

  chart-version:
    name: Helm chart version
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Sync Chart.yaml, values.yaml, and web/package.json to package.json's version
        run: bun run sync:chart-version

      - name: Fail if the Helm chart's or web's version fields are out of date
        run: |
          if ! git diff --exit-code -- k8s/chat-platform/Chart.yaml k8s/chat-platform/values.yaml web/package.json; then
            echo "::error::k8s/chat-platform/Chart.yaml, values.yaml, and/or web/package.json are out of sync with package.json's version." \
              "Run 'bun run sync:chart-version' and commit the result."
            exit 1
          fi

  helm:
    name: Helm chart lint & template
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: azure/setup-helm@v5

      - name: Helm lint
        run: helm lint k8s/chat-platform

      - name: Helm template (default values)
        run: helm template k8s/chat-platform

  unit:
    name: Backend tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Only RealtimePubSub.integration.test.ts uses this — it's the one test
    # that proves cross-instance delivery over real Redis Pub/Sub (see
    # src/PubSub.ts). Everything else uses the in-memory PubSub fallback and
    # doesn't touch it.
    services:
      redis:
        image: redis:7.4.7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 20
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun install cache
        uses: actions/cache@v6.1.0
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock', 'web/bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run backend tests
        # bunfig.toml's [test] timeout is a no-op in this Bun version — the
        # --timeout flag is what actually raises it above the 5000ms default
        # (see the comment in bunfig.toml).
        run: bun test ./src --parallel --timeout=15000
        env:
          REDIS_URL: redis://localhost:6379

  migrate-postgres:
    name: Migrate against real Postgres
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Tests migrate PGlite (an embedded, WASM Postgres) per test file, but
    # production runs the same migrations via Bun.sql against a real
    # wire-protocol Postgres (DbLive's DATABASE_URL branch, see src/Db.ts).
    # Boot the real backend against a Postgres service container — like the
    # `unit` job does for `redis` above — so a migration that happens to
    # work on PGlite but not real Postgres is caught here instead of only
    # showing up once deployed.
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: chat_platform
          POSTGRES_PASSWORD: chat_platform
          POSTGRES_DB: chat_platform
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U chat_platform"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 20
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun install cache
        uses: actions/cache@v6.1.0
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock', 'web/bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # DbLive (src/Db.ts) runs the Drizzle migrations against DATABASE_URL
      # before the server starts accepting requests, and /ready (see
      # src/Health.ts) executes a real query against Db — so a migration
      # that's invalid against real Postgres fails this step instead of
      # only surfacing once deployed. REDIS_URL is left unset so PubSub
      # falls back to its in-memory implementation, which /ready always
      # reports as reachable (see src/PubSub.ts) — only the DB check is
      # meaningful here.
      - name: Boot the backend against real Postgres and wait for /ready
        run: |
          bun run start &
          pid=$!
          trap 'kill $pid 2>/dev/null' EXIT

          for i in $(seq 1 60); do
            if curl -sf http://localhost:3000/ready > /dev/null; then
              echo "Backend is ready; migrations applied successfully."
              exit 0
            fi
            if ! kill -0 $pid 2>/dev/null; then
              echo "::error::Backend process exited before becoming ready (migration likely failed)."
              exit 1
            fi
            sleep 1
          done

          echo "::error::Backend did not become ready in time."
          exit 1
        env:
          DATABASE_URL: postgres://chat_platform:chat_platform@localhost:5432/chat_platform
          JWT_SECRET: ci-migrate-postgres-test-secret

  e2e:
    name: E2E tests (shard ${{ matrix.shard }}/${{ strategy.job-total }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun install cache
        uses: actions/cache@v6.1.0
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock', 'web/bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      # The e2e webServer boots the backend (`bun run start`, cwd `..`) and the
      # web dev server, so both workspaces need their dependencies installed.
      - name: Install backend dependencies
        run: bun install --frozen-lockfile

      - name: Install web dependencies
        run: bun install --frozen-lockfile
        working-directory: web

      - name: Install Playwright browser
        run: bunx playwright install --with-deps chromium
        working-directory: web

      # Each test boots its own backend process (see web/e2e/backend.ts), so
      # running everything on one runner means all shards' backends and
      # browsers compete for that runner's cores. Splitting into shards
      # across separate runners multiplies the CPU budget instead.
      - name: Run Playwright tests
        run: bun run test:e2e --shard=${{ matrix.shard }}/${{ strategy.job-total }}
        working-directory: web

      - name: Upload Playwright traces
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7.0.1
        with:
          name: playwright-traces-${{ matrix.shard }}
          path: web/test-results/
          if-no-files-found: ignore
          retention-days: 7
