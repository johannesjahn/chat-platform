name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Single source of truth for the Bun version used across all jobs.
  BUN_VERSION: 1.3.14

jobs:
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun install cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock', 'web/bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check formatting
        run: bun run format:check

      - name: Lint
        run: bun run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun install cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock', 'web/bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install backend dependencies
        run: bun install --frozen-lockfile

      - name: Install web dependencies
        run: bun install --frozen-lockfile
        working-directory: web

      - name: Typecheck backend
        run: bun run typecheck

      # routeTree.gen.ts is generated by TanStack Router at dev/build time and
      # is gitignored, so the route files have no types until it's generated.
      - name: Generate route tree
        run: bun run gen:routes
        working-directory: web

      - name: Typecheck web
        run: bun run typecheck
        working-directory: web

  build-web:
    name: Web production build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun install cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock', 'web/bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install web dependencies
        run: bun install --frozen-lockfile
        working-directory: web

      # `typecheck` only tsc --noEmit's web/; that catches type errors but not
      # a bundler failure (e.g. an unresolvable import, an invalid Vite/Rollup
      # config) that only vite build itself would hit. Run the same production
      # build used to ship (web/package.json's "build" script, both the
      # TanStack Start client/SSR build and the vite-plugin-pwa build).
      - name: Build web
        run: bun run build
        working-directory: web

  openapi:
    name: OpenAPI spec & generated types
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun install cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock', 'web/bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install backend dependencies
        run: bun install --frozen-lockfile

      - name: Install web dependencies
        run: bun install --frozen-lockfile
        working-directory: web

      - name: Regenerate openapi.json and frontend API types
        run: bun run gen:types
        working-directory: web

      - name: Fail if generated files are out of date
        run: |
          if ! git diff --exit-code -- openapi.json web/src/lib/api-types.ts; then
            echo "::error::openapi.json and/or web/src/lib/api-types.ts are out of date." \
              "Run 'cd web && bun run gen:types' and commit the result."
            exit 1
          fi

  audit:
    name: Dependency vulnerability audit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun install cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock', 'web/bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install backend dependencies
        run: bun install --frozen-lockfile

      - name: Install web dependencies
        run: bun install --frozen-lockfile
        working-directory: web

      # audit-level=high: drizzle-kit currently pulls in a moderate-severity
      # advisory (GHSA-67mh-4wv8-2f99) via its bundled, deprecated
      # @esbuild-kit/* deps — a dev-only esbuild dev-server issue with no
      # upstream fix yet. Gate on high/critical so that's tracked (via
      # Dependabot) without blocking every PR; raise this back to the
      # default (moderate) once it's resolved upstream.
      - name: Audit backend dependencies
        run: bun audit --audit-level=high

      - name: Audit web dependencies
        run: bun audit --audit-level=high
        working-directory: web

  chart-version:
    name: Helm chart version
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Sync Chart.yaml, values.yaml, and web/package.json to package.json's version
        run: bun run sync:chart-version

      - name: Fail if the Helm chart's or web's version fields are out of date
        run: |
          if ! git diff --exit-code -- k8s/chat-platform/Chart.yaml k8s/chat-platform/values.yaml web/package.json; then
            echo "::error::k8s/chat-platform/Chart.yaml, values.yaml, and/or web/package.json are out of sync with package.json's version." \
              "Run 'bun run sync:chart-version' and commit the result."
            exit 1
          fi

  helm:
    name: Helm chart lint & template
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5

      - name: Helm lint
        run: helm lint k8s/chat-platform

      - name: Helm template (default values)
        run: helm template k8s/chat-platform

  helmfile:
    name: Observability stack lint & template
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5

      # Same helmfile version pinned in k8s/observability/README.md's ArgoCD
      # CMP sidecar example — keep the two in sync. No official setup-helmfile
      # GitHub Action exists, so install straight from the goreleaser-published
      # binary tarball, same artifact the README's ArgoCD sidecar image wraps.
      - name: Install helmfile
        run: |
          curl -sSL https://github.com/helmfile/helmfile/releases/download/v1.7.0/helmfile_1.7.0_linux_amd64.tar.gz \
            | tar -xz helmfile
          sudo install helmfile /usr/local/bin/helmfile
          helmfile version

      # k8s/observability's charts (victoria-metrics-k8s-stack, loki, alloy)
      # aren't vendored — helmfile fetches them from the upstream repos
      # declared in helmfile.yaml, same as a real `helmfile apply` would.
      - name: Helmfile lint
        run: helmfile lint
        working-directory: k8s/observability

      - name: Helmfile template (default values)
        run: helmfile template --include-crds > /dev/null
        working-directory: k8s/observability

  unit:
    name: Backend tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Only RealtimePubSub.integration.test.ts uses this — it's the one test
    # that proves cross-instance delivery over real Redis Pub/Sub (see
    # src/PubSub.ts). Everything else uses the in-memory PubSub fallback and
    # doesn't touch it.
    services:
      redis:
        image: redis:8.8.0-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun install cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock', 'web/bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run backend tests with coverage
        # bunfig.toml's [test] timeout is a no-op in this Bun version — the
        # --timeout flag is what actually raises it above the 5000ms default
        # (see the comment in bunfig.toml). --coverage enforces
        # bunfig.toml's [test] coverageThreshold (which *is* honored) and
        # writes a text summary plus an lcov.info report to coverage/,
        # uploaded below.
        run: bun run test:coverage
        env:
          REDIS_URL: redis://localhost:6379

      - name: Upload coverage report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: error
          retention-days: 30

  migrate-postgres:
    name: Migrate against real Postgres
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Tests migrate PGlite (an embedded, WASM Postgres) per test file, but
    # production runs the same migrations via Bun.sql against a real
    # wire-protocol Postgres (DbLive's DATABASE_URL branch, see src/Db.ts).
    # Boot the real backend against a Postgres service container — like the
    # `unit` job does for `redis` above — so a migration that happens to
    # work on PGlite but not real Postgres is caught here instead of only
    # showing up once deployed.
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: chat_platform
          POSTGRES_PASSWORD: chat_platform
          POSTGRES_DB: chat_platform
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U chat_platform"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun install cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock', 'web/bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # DATABASE_URL mode no longer auto-migrates on boot (see issue #178),
      # so run the standalone migration first. REDIS_URL is left unset so
      # PubSub falls back to its in-memory implementation, which /ready
      # always reports as reachable (see src/PubSub.ts) — only the DB
      # migration and subsequent readiness check are meaningful here.
      - name: Run migrations against real Postgres
        run: bun run db:migrate
        env:
          DATABASE_URL: postgres://chat_platform:chat_platform@localhost:5432/chat_platform

      - name: Boot the backend against real Postgres and wait for /ready
        run: |
          bun run start &
          pid=$!
          trap 'kill $pid 2>/dev/null' EXIT

          for i in $(seq 1 60); do
            if curl -sf http://localhost:3000/ready > /dev/null; then
              echo "Backend is ready; migrations applied successfully."
              exit 0
            fi
            if ! kill -0 $pid 2>/dev/null; then
              echo "::error::Backend process exited before becoming ready (migration likely failed)."
              exit 1
            fi
            sleep 1
          done

          echo "::error::Backend did not become ready in time."
          exit 1
        env:
          DATABASE_URL: postgres://chat_platform:chat_platform@localhost:5432/chat_platform
          JWT_SECRET: ci-migrate-postgres-test-secret

  docker:
    name: Docker image build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Registers a docker-container buildx builder wired to the GitHub
      # Actions cache backend, so the `app` image's layers (notably the
      # `bun install --production` layer, see Dockerfile) persist across
      # runs instead of rebuilding from scratch every time — see the
      # `cache_from`/`cache_to: type=gha` entries on the `app` service in
      # docker-compose.yml, which COMPOSE_BAKE below routes through this
      # builder.
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build images
        run: docker compose build
        env:
          COMPOSE_BAKE: "true"
          POSTGRES_PASSWORD: ci-docker-build-test-secret
          REDIS_PASSWORD: ci-docker-build-test-secret
          JWT_SECRET: ci-docker-build-test-secret

      # Boots the full docker-compose.yml stack (Postgres + Redis + the image
      # built from the Dockerfile) and waits for the `app` service's own
      # healthcheck (/ready, see src/Health.ts) to pass. Catches a broken
      # COPY, a `--production` install dropping a needed dep, or a
      # Dockerfile/compose wiring mismatch that unit tests against PGlite
      # can't see, instead of only surfacing once deployed.
      - name: Boot the stack and wait for the app to become healthy
        run: |
          docker compose up -d
          trap 'docker compose logs; docker compose down -v' EXIT

          for i in $(seq 1 60); do
            status=$(docker inspect -f '{{.State.Health.Status}}' "$(docker compose ps -q app)" 2>/dev/null || echo starting)
            if [ "$status" = "healthy" ]; then
              echo "App is healthy."
              exit 0
            fi
            if [ "$status" = "unhealthy" ]; then
              echo "::error::App container reported unhealthy."
              exit 1
            fi
            sleep 2
          done

          echo "::error::App did not become healthy in time."
          exit 1
        env:
          POSTGRES_PASSWORD: ci-docker-build-test-secret
          REDIS_PASSWORD: ci-docker-build-test-secret
          JWT_SECRET: ci-docker-build-test-secret

  e2e:
    name: E2E tests (shard ${{ matrix.shard }}/${{ strategy.job-total }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun install cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock', 'web/bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      # The e2e webServer boots the backend (`bun run start`, cwd `..`) and the
      # web dev server, so both workspaces need their dependencies installed.
      - name: Install backend dependencies
        run: bun install --frozen-lockfile

      - name: Install web dependencies
        run: bun install --frozen-lockfile
        working-directory: web

      # Only the browser binary (Chromium) is cacheable across runs — the
      # system deps below are apt packages on an ephemeral, fresh-each-run
      # runner VM, so there's nothing to persist for those. Keyed on
      # web/bun.lock, which pins the @playwright/test (and thus browser)
      # version, so a version bump naturally busts the cache.
      - name: Cache Playwright browsers
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('web/bun.lock') }}

      # Split from browser install: `playwright install` skips re-downloading
      # a browser already present in the cache above, so only this step's
      # apt-get work runs unconditionally on every shard.
      - name: Install Playwright system dependencies
        run: bunx playwright install-deps chromium
        working-directory: web

      - name: Install Playwright browser
        run: bunx playwright install chromium
        working-directory: web

      # Each test boots its own backend process (see web/e2e/backend.ts), so
      # running everything on one runner means all shards' backends and
      # browsers compete for that runner's cores. Splitting into shards
      # across separate runners multiplies the CPU budget instead.
      - name: Run Playwright tests
        run: bun run test:e2e --shard=${{ matrix.shard }}/${{ strategy.job-total }}
        working-directory: web

      - name: Upload Playwright traces
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-traces-${{ matrix.shard }}
          path: web/test-results/
          if-no-files-found: ignore
          retention-days: 7
