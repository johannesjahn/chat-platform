version: 2
updates:
  # Backend dependencies (root package.json / bun.lock)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: daily
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch

  # Web frontend dependencies (web/package.json / web/bun.lock)
  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: daily
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch

  # GitHub Actions used in the workflows
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
