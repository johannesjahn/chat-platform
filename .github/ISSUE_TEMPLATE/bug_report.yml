name: Bug report
description: Report a problem with the chat platform
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the sections below as completely as you can.

  - type: dropdown
    id: package
    attributes:
      label: Affected package
      description: Which part of the repo is affected?
      options:
        - Backend (repo root)
        - Frontend (web/)
        - Both / not sure
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened. Include error messages, stack traces, or screenshots if applicable.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Release tag, commit SHA, or deployment environment where you saw this.
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else relevant (browser, OS, logs, related issues).
    validations:
      required: false
